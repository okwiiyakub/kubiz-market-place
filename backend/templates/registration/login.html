<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kubiz Admin Login</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Roboto, sans-serif;
    }

    body {
        height: 100vh;
        background: linear-gradient(135deg, #2563eb, #1e40af);
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .login-container {
        background: white;
        padding: 40px;
        border-radius: 18px;
        width: 380px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.15);
        text-align: center;
    }

    .logo {
        font-size: 28px;
        font-weight: bold;
        color: #2563eb;
        margin-bottom: 10px;
    }

    .subtitle {
        color: #6b7280;
        font-size: 14px;
        margin-bottom: 30px;
    }

    .input-group {
        margin-bottom: 18px;
        text-align: left;
    }

    label {
        font-size: 13px;
        color: #374151;
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
    }

    input {
        width: 100%;
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid #d1d5db;
        font-size: 14px;
        transition: 0.2s ease;
    }

    input:focus {
        outline: none;
        border-color: #2563eb;
        box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
    }

    button {
        width: 100%;
        padding: 14px;
        border-radius: 12px;
        border: none;
        background: #2563eb;
        color: white;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.25s ease;
    }

    button:hover {
        background: #1e40af;
    }

    .error {
        background: #fee2e2;
        color: #b91c1c;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 15px;
        font-size: 13px;
    }

    .footer-text {
        margin-top: 18px;
        font-size: 12px;
        color: #9ca3af;
    }
</style>
</head>

<body>

<div class="login-container">

    <div class="logo">Kubiz Admin</div>
    <div class="subtitle">Secure dashboard access</div>

    {% if form.errors %}
        <div class="error">
            Invalid username or password
        </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <div class="input-group">
            <label>Username</label>
            {{ form.username }}
        </div>

        <div class="input-group">
            <label>Password</label>
            {{ form.password }}
        </div>

        <button type="submit">
            Login to Dashboard
        </button>
    </form>

    <div class="footer-text">
        Kubiz Market Place Administration Panel
    </div>

</div>

</body>
</html>
